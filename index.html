<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Links</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #5b443c;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    text-align: center;
    color: white;
  }

  /* Profile Image */
  .profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid white;
    margin-top: 30px;
  }

  /* Username */
  .username {
    font-size: 20px;
    font-weight: bold;
    margin: 15px 0 30px;
  }

  /* Link Buttons */
  .link {
    display: flex;
    align-items: center;
    background: #e5e5e5;
    border-radius: 12px;
    padding: 15px;
    margin: 12px 0;
    text-decoration: none;
    color: black;
    font-weight: 500;
  }

  /* Square Icon */
  .icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    margin-right: 15px;
    object-fit: cover;
  }

  .link:hover {
    background: #d6d6d6;
  }
</style>
</head>
